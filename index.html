function slaBadge(sla){if(!sla)return '';const s=sla.situacao||'sem_prazo';let txt=SLA_LABEL[s]||s;
  if((s==='no_prazo'||s==='vence_breve'||s==='em_atraso')&&sla.segundos_restantes!=null)txt+=' · '+fmtRestante(sla.segundos_restantes);
  return `<span class="sla sla-${s}">${txt}</span>`;}
function fmtRestante(seg){const atraso=seg<0;let s=Math.abs(seg);const d=Math.floor(s/86400);const h=Math.floor((s%86400)/3600);
  let t=d>0?`${d}d`:`${h}h`;return atraso?`atrasado ${t}`:`faltam ${t}`;}
const reEmail=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
function ir(view){S.view=view;document.querySelector('nav.menu').classList.remove('open');
  $$('nav.menu a').forEach(a=>a.classList.toggle('active',a.dataset.view===view));window.scrollTo(0,0);render();}
function render(){const v=S.view;
  if(v==='home')renderHome();else if(v==='registrar')renderRegistrar();else if(v==='mapa')renderMapa();
  else if(v==='acompanhar')renderAcompanhar();else if(v==='equipe')renderEquipe();}

function maskTel(el){let d=el.value.replace(/\D/g,'').slice(0,11);
  if(d.length>10)el.value=`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  else if(d.length>6)el.value=`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  else if(d.length>2)el.value=`(${d.slice(0,2)}) ${d.slice(2)}`;else el.value=d;}
function onCep(el){let d=el.value.replace(/\D/g,'').slice(0,8);el.value=d.length>5?d.slice(0,5)+'-'+d.slice(5):d;
  if(d.length===8)buscarCep(d);else{_cepInfo=null;$('#cepFb').className='cep-feedback';$('#cepFb').textContent='';$('#boxEndereco').style.display='none';}}
async function buscarCep(cep){const fb=$('#cepFb');fb.className='cep-feedback load';fb.innerHTML='<span class="spinner" style="border-color:#bbb;border-top-color:#666"></span> Buscando CEP…';
  try{const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`);const j=await r.json();
    if(j.erro){_cepInfo=null;fb.className='cep-feedback err';fb.textContent='✕ CEP não encontrado.';$('#boxEndereco').style.display='none';return;}
    const ehMogi=(j.ibge===MOGI_IBGE)||/mogi gua/i.test(j.localidade||'');
    if(!ehMogi){_cepInfo=null;fb.className='cep-feedback err';fb.textContent=`✕ Este CEP é de ${j.localidade||'outra cidade'}. Informe um CEP de Mogi Guaçu.`;$('#boxEndereco').style.display='none';return;}
    _cepInfo={cep,logradouro:j.logradouro||'',bairro:j.bairro||'',localidade:j.localidade||'',uf:j.uf||''};
    fb.className='cep-feedback ok';fb.textContent='✓ CEP de Mogi Guaçu confirmado.';
    $('#boxEndereco').style.display='grid';$('#fLogradouro').value=j.logradouro||'';$('#fBairro').value=j.bairro||'';
    centralizarPorEndereco();
  }catch(e){fb.className='cep-feedback err';fb.textContent='✕ Não foi possível consultar o CEP agora.';}}
function initMapaRegistrar(){if(S.mapaReg){S.mapaReg.remove();S.mapaReg=null;}
  S.mapaReg=L.map('mapaRegistrar',{scrollWheelZoom:false}).setView(MOGI,13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(S.mapaReg);
  S.markerReg=null;S.mapaReg.on('click',e=>{setMarker(e.latlng.lat,e.latlng.lng);reverseGeocode(e.latlng.lat,e.latlng.lng);});}
function setMarker(lat,lng){if(S.markerReg)S.markerReg.setLatLng([lat,lng]);
  else S.markerReg=L.marker([lat,lng],{draggable:true}).addTo(S.mapaReg).on('dragend',ev=>{const p=ev.target.getLatLng();S.markerReg._lat=p.lat;S.markerReg._lng=p.lng;atualizaPonto();reverseGeocode(p.lat,p.lng);});
  S.markerReg._lat=lat;S.markerReg._lng=lng;atualizaPonto();}
function atualizaPonto(){$('#pontoInfo').textContent=S.markerReg?'Ponto marcado ✓':'';}
function limparMarcador(){if(S.markerReg){S.mapaReg.removeLayer(S.markerReg);S.markerReg=null;}atualizaPonto();}
function usarMinhaLocalizacao(){if(!navigator.geolocation)return toast('Geolocalização indisponível.',true);
  navigator.geolocation.getCurrentPosition(p=>{S.mapaReg.setView([p.coords.latitude,p.coords.longitude],17);setMarker(p.coords.latitude,p.coords.longitude);reverseGeocode(p.coords.latitude,p.coords.longitude);},
    ()=>toast('Não foi possível obter sua localização.',true));}
async function centralizarPorEndereco(){const log=$('#fLogradouro')?.value,bai=$('#fBairro')?.value;
  const q=[log,bai,'Mogi Guaçu','SP','Brasil'].filter(Boolean).join(', ');
  try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(q)}`,{headers:{'Accept-Language':'pt-BR'}});
    const j=await r.json();if(j&&j[0]){const la=+j[0].lat,ln=+j[0].lon;S.mapaReg.setView([la,ln],16);setMarker(la,ln);}else S.mapaReg.setView(MOGI,13);
  }catch(e){S.mapaReg.setView(MOGI,13);}}
async function reverseGeocode(lat,lng){const fb=$('#cepFb');if(fb){fb.className='cep-feedback load';fb.innerHTML='<span class="spinner" style="border-color:#bbb;border-top-color:#666"></span> Localizando endereço do ponto…';}
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=18&addressdetails=1&lat=${lat}&lon=${lng}`,{headers:{'Accept-Language':'pt-BR'}});
    const j=await r.json();const a=j.address||{};const cidade=a.city||a.town||a.municipality||a.village||'';
    const ehMogi=/mogi gua/i.test(cidade)||/mogi gua/i.test(j.display_name||'');
    const cep=(a.postcode||'').replace(/\D/g,'');
    if(!ehMogi){if(fb){fb.className='cep-feedback err';fb.textContent='✕ Este ponto não parece estar em Mogi Guaçu. Marque dentro da cidade.';}_cepInfo=null;return;}
    const log=a.road||'',bai=a.suburb||a.neighbourhood||a.city_district||'';
    _cepInfo={cep:cep||'',logradouro:log,bairro:bai,localidade:cidade||'Mogi Guaçu',uf:a.state_code||'SP'};
    if(cep.length===8&&$('#fCep'))$('#fCep').value=cep.slice(0,5)+'-'+cep.slice(5);
    $('#boxEndereco').style.display='grid';$('#fLogradouro').value=log;$('#fBairro').value=bai;
    if(fb){fb.className='cep-feedback ok';fb.textContent=cep.length===8?'✓ Endereço do ponto localizado (CEP preenchido).':'✓ Ponto em Mogi Guaçu localizado.';}
  }catch(e){if(fb){fb.className='cep-feedback err';fb.textContent='✕ Não foi possível localizar o endereço do ponto.';}}}
function addFotos(ev){const files=[...ev.target.files].slice(0,3-S.formImgs.length);
  files.forEach(f=>{if(!f.type.startsWith('image/'))return;comprimir(f).then(o=>{S.formImgs.push(o);renderThumbs('thumbs',S.formImgs,'rmFoto');});});ev.target.value='';}
function comprimir(file){return new Promise(res=>{const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{URL.revokeObjectURL(url);const MAX=1280;let {width:w,height:h}=img;
    if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    let q=0.62,data=c.toDataURL('image/jpeg',q);while(data.length>240000&&q>0.3){q-=0.1;data=c.toDataURL('image/jpeg',q);}
    res({b64:data.split(',')[1],mime:'image/jpeg',bytes:Math.round(data.length*0.75),preview:data});};img.src=url;});}
function renderThumbs(id,arr,rmfn){$('#'+id).innerHTML=arr.map((o,i)=>`<div class="thumb"><img src="${o.preview}"><button onclick="${rmfn}(${i})">×</button></div>`).join('');}
function rmFoto(i){S.formImgs.splice(i,1);renderThumbs('thumbs',S.formImgs,'rmFoto');}
async function enviarReclamacao(){
  const nome=$('#fNome').value.trim(),email=$('#fEmail').value.trim(),tel=$('#fTelefone').value.replace(/\D/g,'');
  const cep=(_cepInfo?.cep||$('#fCep').value||'').replace(/\D/g,'');
  if(!nome){toast('Informe seu nome.',true);$('#fNome').focus();return;}
  if(!reEmail.test(email)){toast('Informe um e-mail válido.',true);$('#fEmail').focus();return;}
  if(tel.length<10){toast('Informe um celular válido com DDD.',true);$('#fTelefone').focus();return;}
  if(!($('#fDescricao').value||'').trim()){toast('Descreva sua manifestação.',true);$('#fDescricao').focus();return;}
  if(!_cepInfo||cep.length!==8){toast('Informe um CEP válido de Mogi Guaçu (ou marque um ponto no mapa).',true);$('#fCep').focus();return;}
  const dados={tipo:$('#segTipo .on')?.dataset.v||'reclamacao',categoria:$('#fCategoria').value,titulo:$('#fTitulo').value.trim(),
    descricao:$('#fDescricao').value.trim(),nome,email,telefone:$('#fTelefone').value,ddi:$('#fDDI').value,
    cep,logradouro:_cepInfo.logradouro||'',bairro:_cepInfo.bairro||'',localidade:_cepInfo.localidade||'',uf:_cepInfo.uf||'',
    latitude:S.markerReg?String(S.markerReg._lat):'',longitude:S.markerReg?String(S.markerReg._lng):'',
    imagens:S.formImgs.map(o=>({b64:o.b64,mime:o.mime,bytes:o.bytes}))};
  const b=$('#btnEnviar');b.disabled=true;b.innerHTML='<span class="spinner"></span> Enviando…';
  const {data,error}=await _sb.rpc('fg_criar_reclamacao',{p_dados:dados});
  b.disabled=false;b.textContent='Enviar manifestação';
  if(error||!data?.sucesso){toast(data?.mensagem||'Erro ao enviar.',true);return;}
  mostrarProtocolo(data.protocolo);}
function mostrarProtocolo(protocolo){$('#formArea').innerHTML=`
  <div class="proto-box"><small>Manifestação registrada com sucesso 🎉</small>
    <div class="tok">${esc(protocolo)}</div>
    <div><small>Guarde este protocolo. Enviamos uma cópia para o seu e-mail.</small></div>
    <div style="margin-top:10px"><button class="copy" onclick="copiar('${esc(protocolo)}')">copiar protocolo</button></div></div>
  <div class="card" style="margin-top:18px"><div class="pad" style="text-align:center">
    <p style="color:var(--muted);margin:0 0 16px">Use o protocolo na aba <b>Acompanhar</b> para ver o status, o prazo e as respostas. Você também receberá avisos por e-mail a cada andamento.</p>
    <button class="btn btn-navy" onclick="abrirAcompanharCom('${esc(protocolo)}')">Acompanhar agora</button>
    <button class="btn btn-ghost" onclick="ir('registrar')">Registrar outra</button></div></div>`;window.scrollTo(0,0);}
function copiar(t){navigator.clipboard?.writeText(t).then(()=>toast('Copiado ✓')).catch(()=>toast('Copie manualmente: '+t));}
function abrirAcompanharCom(p){ir('acompanhar');setTimeout(()=>{$('#aProtocolo').value=p;consultarProtocolo();},80);}

    <div id="resumoPublico" style="margin-top:14px"></div>

async function carregarMapaPublico(){
  if(S.mapaPublico){S.mapaPublico.remove();S.mapaPublico=null;}
  S.mapaPublico=L.map('mapaPublico').setView(MOGI,13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(S.mapaPublico);
  const {data}=await _sb.rpc('fg_mapa_publico');
  const pts=(data?.pontos)||[];
  S.clusterPub=L.markerClusterGroup({maxClusterRadius:50});
  const grp=[],porTipo={},porBairro={};
  pts.forEach(p=>{if(p.lat==null||p.lng==null)return;porTipo[p.tipo]=(porTipo[p.tipo]||0)+1;if(p.bairro)porBairro[p.bairro]=(porBairro[p.bairro]||0)+1;
    const ic=L.divIcon({html:`<div class="pin" style="background:${TIPO_COR[p.tipo]||'#6B7280'}"><span>${TIPO_ICON[p.tipo]||'📌'}</span></div>`,className:'',iconSize:[30,30],iconAnchor:[15,28]});
    const m=L.marker([p.lat,p.lng],{icon:ic});
    m.bindPopup(`<b>${TIPO_LABEL[p.tipo]||p.tipo}</b>${p.categoria?'<br>'+esc(p.categoria):''}${p.bairro?'<br>'+esc(p.bairro):''}<br>${STATUS_LABEL[p.status]||p.status} · ${SLA_LABEL[p.sla_situacao]||''}<br>👥 ${p.apoios||0} apoio(s)<br><a href="#" onclick="abrirContribuir(${p.id});return false">Acrescentar informação →</a>`);
    S.clusterPub.addLayer(m);grp.push([p.lat,p.lng]);});
  S.mapaPublico.addLayer(S.clusterPub);
  if(grp.length)S.mapaPublico.fitBounds(grp,{padding:[40,40],maxZoom:15});
  const tipoHtml=Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<span class="apoios-tag" style="margin:3px">${TIPO_ICON[t]||''} ${TIPO_LABEL[t]||t}: <b>${n}</b></span>`).join('');
  const baiHtml=Object.entries(porBairro).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([b,n])=>`<span class="apoios-tag" style="margin:3px">${esc(b)}: <b>${n}</b></span>`).join('');
  $('#resumoPublico').innerHTML=`<div style="font-size:12px;font-weight:800;color:var(--gold-dark);text-transform:uppercase;margin-bottom:6px">Por tipo</div>${tipoHtml||'<span style="color:var(--muted)">Sem dados ainda.</span>'}
    ${baiHtml?`<div style="font-size:12px;font-weight:800;color:var(--gold-dark);text-transform:uppercase;margin:12px 0 6px">Por bairro</div>${baiHtml}`:''}`;}
async function abrirContribuir(id){const ov=$('#overlay'),dw=$('#drawer');
  dw.innerHTML=`<div class="db center-load"><span class="spinner" style="border-color:#bbb;border-top-color:#666"></span> Abrindo…</div>`;ov.classList.add('show');
  const {data}=await _sb.rpc('fg_ver_publica',{p_id:id});const r=data?.reclamacao;
  if(!r){dw.innerHTML=`<div class="db" style="color:var(--danger)">Não foi possível abrir.</div>`;return;}

async function carregarSerieTempo(){const box=$('#serieTempo');if(!box)return;

  if(!meses.length){box.innerHTML='<div style="color:var(--muted);text-align:center">Sem dados ainda.</div>';return;}

  let svg=`<svg viewBox="0 0 ${W} ${H+34}" style="width:100%;max-width:${W}px">`;
  meses.forEach((m,i)=>{const x=pad+i*step+(step-bw)/2,h=Math.round(m.total/max*H),y=H-h+10;

    svg+=`<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="11" fill="var(--ink)">${m.total}</text>`;

    <select class="inp" id="fStatusSel" style="max-width:170px" onchange="carregarFilaLista()"><option value="">Todos os status</option>
      ${Object.entries(STATUS_LABEL).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
    <select class="inp" id="fCatSel" style="max-width:200px" onchange="carregarFilaLista()"><option value="">Todos os temas</option>
      ${CATEGORIAS.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select>
    <select class="inp" id="fOrdemSel" style="max-width:200px" onchange="carregarFilaLista()">
      <option value="urgentes">Prioridade: mais urgentes</option>
      <option value="apoios">Prioridade: mais apoiadas</option>
      <option value="recentes">Mais recentes</option>
      <option value="antigas">Mais antigas</option></select>
    <button class="btn btn-ghost btn-sm" onclick="carregarFilaLista()">Buscar</button></div>
   <div id="filaLista"><div class="center-load"><span class="spinner" style="border-color:#bbb;border-top-color:#666"></span> Carregando…</div></div>`;
  carregarFilaLista();}
async function carregarFilaLista(){const busca=$('#fBusca')?.value||'',st=$('#fStatusSel')?.value||'',ordem=$('#fOrdemSel')?.value||'urgentes',cat=$('#fCatSel')?.value||'';
  const {data,error}=await _sb.rpc('fg_listar_reclamacoes',{p_status:st||null,p_busca:busca||null,p_ordem:ordem,p_categoria:cat||null,p_limit:200,p_offset:0});
  const box=$('#filaLista');if(error||!data?.sucesso){box.innerHTML=`<div class="card"><div class="pad" style="color:var(--danger)">Erro ao listar.</div></div>`;return;}
  const itens=data.itens||[];if(!itens.length){box.innerHTML=`<div class="card"><div class="pad" style="color:var(--muted);text-align:center">Nenhuma manifestação.</div></div>`;return;}
  box.innerHTML=itens.map(r=>`<div class="list-item" onclick="abrirDetalhe(${r.id})">
    <div class="pr">${TIPO_ICON[r.tipo]||''}<br>${esc(r.protocolo.split('-').slice(0,3).join('-'))}</div>
    <div><div class="ti">${esc(r.titulo||TIPO_LABEL[r.tipo]||r.tipo)}</div>
      <div class="me">${r.bairro?esc(r.bairro)+' · ':''}${r.categoria?esc(r.categoria)+' · ':''}${fmtData(r.criado_em)}</div>
      <div style="margin-top:6px">${badge(r.status)} ${slaBadge(r.sla)} <span class="apoios-tag">👥 ${r.apoios||0}</span>${r.ativo===false?' <span class="badge b-suspensa">desativada</span>':''}</div></div>
    <div>→</div></div>`).join('');}
async function abrirDetalhe(id){const ov=$('#overlay'),dw=$('#drawer');
  dw.innerHTML=`<div class="db center-load"><span class="spinner" style="border-color:#bbb;border-top-color:#666"></span> Abrindo…</div>`;ov.classList.add('show');
  const {data,error}=await _sb.rpc('fg_obter_reclamacao',{p_id:id});
  if(error||!data?.sucesso){dw.innerHTML=`<div class="db" style="color:var(--danger)">Erro ao abrir.</div>`;return;}
  const r=data.reclamacao,inter=data.interacoes||[],sla=r.sla||{},c=data.contato||{};const ehAdmin=S.papel==='admin';
  const final=r.status==='finalizada';_detAtual=id;
  dw.innerHTML=`<div class="dh"><h3>${esc(r.protocolo)} ${badge(r.status)} ${slaBadge(sla)}</h3><button class="x" onclick="fecharDrawer()">×</button></div>
   <div class="db">
     <div class="contato-box"><div class="ct">Dados do solicitante (uso restrito da equipe)</div>
       <div class="kv"><span class="k">Nome</span><span>${esc(c.nome||'—')}</span></div>
       <div class="kv"><span class="k">E-mail</span><span>${esc(c.email||'—')}</span></div>
       <div class="kv"><span class="k">Celular</span><span>${esc(c.telefone||'—')}</span></div></div>
     <div class="kv"><span class="k">Tipo</span><span>${esc(TIPO_LABEL[r.tipo]||r.tipo)}${r.categoria?' · '+esc(r.categoria):''}</span></div>
     ${r.titulo?`<div class="kv"><span class="k">Título</span><span>${esc(r.titulo)}</span></div>`:''}
     <div class="kv"><span class="k">Descrição</span><span>${esc(r.descricao||'—')}</span></div>
     <div class="kv"><span class="k">Local</span><span>${esc([r.logradouro,r.bairro].filter(Boolean).join(', ')||'—')} · CEP ${esc(r.cep||'—')}</span></div>
     ${(r.latitude&&r.longitude)?`<div class="kv"><span class="k">Mapa</span><span><a href="https://www.openstreetmap.org/?mlat=${r.latitude}&mlon=${r.longitude}#map=17/${r.latitude}/${r.longitude}" target="_blank">ver ponto ↗</a></span></div>`:''}
     <div class="kv"><span class="k">Registrada</span><span>${fmtData(r.criado_em)}</span></div>
     <div class="kv"><span class="k">Prazo</span><span>${sla.prazo_efetivo?fmtData(sla.prazo_efetivo):'—'} · ${slaBadge(sla)}</span></div>
     <div class="kv"><span class="k">Apoios</span><span>👥 ${r.apoios||0}</span></div>
     <div style="border-top:1px solid var(--line);margin:16px 0;padding-top:16px"><div class="timeline">${inter.map(i=>tlItemAdmin(i,ehAdmin)).join('')}</div></div>
     ${final?`<div style="text-align:center;color:var(--muted);font-size:14px">Esta manifestação foi finalizada.</div>`:`
       <div style="border-top:1px dashed var(--line);padding-top:16px">
         <span class="lab" style="display:block;font-weight:700;color:var(--navy);margin-bottom:6px">Responder (aparece como "Equipe FalaGuaçu")</span>
         <textarea id="rMsg" placeholder="Escreva a resposta…"></textarea>
         <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
           <button class="btn btn-gold btn-sm" onclick="responder(${r.id},'responder')">Responder</button>
           <button class="btn btn-ghost btn-sm" onclick="responder(${r.id},'pedir_complemento')">Pedir complemento</button>
           ${r.status==='suspensa'?`<button class="btn btn-ghost btn-sm" onclick="responder(${r.id},'reabrir')">Reabrir</button>`:`<button class="btn btn-ghost btn-sm" onclick="responder(${r.id},'suspender')">Suspender (pausa SLA)</button>`}
           <button class="btn btn-navy btn-sm" onclick="responder(${r.id},'finalizar')">Finalizar</button></div></div>`}
     ${ehAdmin?`<div style="border-top:1px dashed var(--line);margin-top:16px;padding-top:14px">
       <span class="lab" style="display:block;font-weight:700;color:var(--danger);margin-bottom:6px">Administração</span>
       <div style="display:flex;gap:8px;flex-wrap:wrap">
         ${r.ativo===false?`<button class="btn btn-ghost btn-sm" onclick="adminAcao('fg_admin_reativar',{p_id:${r.id}},${r.id})">Reativar</button>`:`<button class="btn btn-ghost btn-sm" onclick="if(confirm('Desativar esta manifestação? Sai do mapa público e da fila.'))adminAcao('fg_admin_desativar_reclamacao',{p_id:${r.id},p_motivo:prompt('Motivo (opcional):')||''},${r.id})">Desativar</button>`}
         <button class="btn btn-danger btn-sm" onclick="if(confirm('Remover PERMANENTEMENTE os dados pessoais (nome, e-mail, telefone)? Não pode ser desfeito.'))adminAcao('fg_admin_anonimizar_reclamacao',{p_id:${r.id}},${r.id})">Anonimizar solicitante</button></div></div>`:''}
   </div>`;}
function tlItemAdmin(i,ehAdmin){const atend=i.autor==='atendente';const contrib=i.tipo_acao==='contribuicao';
  const acao={abertura:'Registrada',complemento:'Complemento do cidadão',contribuicao:'Contribuição de outro cidadão',resposta:'Resposta da equipe',pedido_complemento:'Pediu complemento',finalizacao:'Finalizada',em_tratamento:'Em tratamento',suspensao:'Suspensa',reabertura:'Reaberta'}[i.tipo_acao]||'';
  const modBtns=(ehAdmin&&!i.removida&&i.id)?`<div class="tl-mod">
     <button class="btn btn-ghost btn-sm" onclick="if(confirm('Anonimizar o texto desta mensagem?'))adminAcao('fg_admin_anonimizar_interacao',{p_id:${i.id}},_detAtual)">Anonimizar texto</button>
     ${(i.anexos&&i.anexos.length)?i.anexos.filter(a=>a.id).map(a=>`<button class="btn btn-ghost btn-sm" onclick="if(confirm('Excluir esta imagem?'))adminAcao('fg_admin_excluir_anexo',{p_id:${a.id}},_detAtual)">Excluir foto</button>`).join(''):''}
   </div>`:'';
  return `<div class="tl-item ${atend?'atend':''} ${contrib?'contrib':''}">
    <span class="dot" style="background:${atend?'#2D7DD2':(contrib?'#F2A900':'#9A6B00')}"></span>
    <div class="who"><b>${esc(i.autor_nome)}</b> · ${fmtData(i.criado_em)}${acao?' · '+acao:''}</div>
    <div class="msg">${esc(i.mensagem)}
      ${(i.anexos&&i.anexos.length)?`<div class="tl-anexos">${i.anexos.map(a=>`<img src="data:${mimeImg(a.mime)};base64,${esc(a.b64)}" onclick="verImg(this.src)">`).join('')}</div>`:''}
      ${modBtns}</div></div>`;}
let _detAtual=null;
function fecharDrawer(){$('#overlay').classList.remove('show');}
async function responder(id,acao){const msg=$('#rMsg').value.trim();
  if(!msg){toast('Escreva a mensagem.',true);return;}
  if(acao==='finalizar'&&!confirm('Finalizar esta manifestação?'))return;
  const {data,error}=await _sb.rpc('fg_responder',{p_id:id,p_mensagem:msg,p_acao:acao});
  if(error||!data?.sucesso){toast(data?.mensagem||'Erro.',true);return;}
  toast('Registrado ✓');fecharDrawer();if(_abaEquipe==='fila')carregarFilaLista();else carregarVisaoGeral();}
async function adminAcao(fn,params,reabrirId){_detAtual=reabrirId;
  const {data,error}=await _sb.rpc(fn,params);
  if(error||!data?.sucesso){toast(data?.mensagem||'Erro.',true);return;}
  toast('Feito ✓');if(reabrirId)abrirDetalhe(reabrirId);if(_abaEquipe==='fila')carregarFilaLista();}
async function carregarPrazos(){const {data,error}=await _sb.rpc('fg_prazos_listar');
  if(error||!data?.sucesso){$('#abaArea').innerHTML=`<div class="card"><div class="pad" style="color:var(--danger)">Erro.</div></div>`;return;}
  const m=Object.fromEntries((data.itens||[]).map(x=>[x.tipo,x.dias]));
  $('#abaArea').innerHTML=`<div class="card"><div class="card-h"><div><h3>Prazos de resposta por tipo (SLA)</h3><div class="sub">Em dias corridos. O prazo é fixado no momento do registro de cada manifestação.</div></div></div>
    <div class="pad">${TIPOS.map(t=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)">
      <div style="flex:1;font-weight:600">${TIPO_ICON[t[0]]} ${t[1]}</div>
      <input class="inp" id="pz_${t[0]}" type="number" min="1" max="365" value="${m[t[0]]??10}" style="max-width:110px">
      <span style="color:var(--muted);font-size:13px">dias</span>
      <button class="btn btn-gold btn-sm" onclick="salvarPrazo('${t[0]}')">Salvar</button></div>`).join('')}</div></div>`;}
async function salvarPrazo(tipo){const dias=parseInt($('#pz_'+tipo).value,10);if(!dias||dias<1){toast('Dias inválidos.',true);return;}
  const {data,error}=await _sb.rpc('fg_admin_prazo_set',{p_tipo:tipo,p_dias:dias});
  if(error||!data?.sucesso){toast(data?.mensagem||'Erro.',true);return;}toast('Prazo salvo ✓');}
async function carregarLog(){const {data,error}=await _sb.rpc('fg_admin_log_listar',{p_limit:200,p_offset:0});
  if(error||!data?.sucesso){$('#abaArea').innerHTML=`<div class="card"><div class="pad" style="color:var(--danger)">Acesso restrito.</div></div>`;return;}
  const itens=data.itens||[];const ACAO={criou_operador:'➕',editou_operador:'✏️',desativou:'🚫',reativou:'✅',anonimizou_reclamacao:'🕵️',anonimizou_interacao:'🩹',excluiu_anexo:'🗑️',respondeu:'💬',pediu_complemento:'❓',finalizou:'🏁',suspendeu:'⏸️',reabriu:'▶️',em_tratamento:'👀',alterou_prazo:'⏱️'};
  $('#abaArea').innerHTML=`<div class="card"><div class="card-h"><div><h3>Trilha de auditoria (${itens.length})</h3><div class="sub">Quem fez, o quê, quando.</div></div></div>
    <div class="pad">${itens.length?itens.map(l=>`<div class="log-item"><div class="ic">${ACAO[l.acao]||'•'}</div>
      <div><div class="ac">${esc(l.ator_nome||'—')} · ${esc(LOG_TXT(l.acao))}</div>
        <div class="me">${l.reclamacao_id?'Manifestação #'+l.reclamacao_id+' · ':''}${l.detalhe?esc(JSON.stringify(l.detalhe)):''}</div></div>
      <div class="me" style="text-align:right">${fmtData(l.criado_em)}</div></div>`).join(''):'<div style="color:var(--muted);text-align:center">Nenhum registro ainda.</div>'}</div></div>`;}
function LOG_TXT(a){return {criou_operador:'criou operador',editou_operador:'editou operador',desativou:'desativou manifestação',reativou:'reativou manifestação',anonimizou_reclamacao:'anonimizou solicitante',anonimizou_interacao:'anonimizou mensagem',excluiu_anexo:'excluiu foto',respondeu:'respondeu',pediu_complemento:'pediu complemento',finalizou:'finalizou',suspendeu:'suspendeu',reabriu:'reabriu',em_tratamento:'abriu (em tratamento)',alterou_prazo:'alterou prazo'}[a]||a;}
async function carregarOperadores(){const {data,error}=await _sb.rpc('fg_admin_listar_operadores');
  if(error||!data?.sucesso){$('#abaArea').innerHTML=`<div class="card"><div class="pad" style="color:var(--danger)">Acesso restrito.</div></div>`;return;}
  const itens=data.itens||[];
  $('#abaArea').innerHTML=`<div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Novo operador</h3></div><div class="pad">
     <div class="row c2"><label class="fld"><span class="lab">Nome</span><input class="inp" id="oNome"></label>
       <label class="fld"><span class="lab">E-mail</span><input class="inp" id="oEmail" type="email"></label></div>
     <div class="row c2"><label class="fld"><span class="lab">Senha <span class="hint">(mín. 6)</span></span><input class="inp" id="oSenha" type="text"></label>
       <label class="fld"><span class="lab">Papel</span><select id="oPapel"><option value="operador">Operador (vê e responde)</option><option value="admin">Administrador (acesso total)</option></select></label></div>
     <button class="btn btn-gold" id="btnNovoOp" onclick="criarOperador()">Criar operador</button></div></div>
   <div class="card"><div class="card-h"><h3>Equipe (${itens.length})</h3></div><div class="pad">
     ${itens.map(o=>`<div class="list-item" style="cursor:default"><div class="pr">${o.papel==='admin'?'👑':'👤'}</div>
       <div><div class="ti">${esc(o.nome)} ${o.ativo?'':'<span class="badge b-a_completar">inativo</span>'}</div><div class="me">${esc(o.email||'')} · ${o.papel}</div></div>
       <div><button class="btn btn-ghost btn-sm" onclick="toggleOp('${o.id}',${o.ativo})">${o.ativo?'Desativar':'Ativar'}</button></div></div>`).join('')}</div></div>`;}
async function criarOperador(){const nome=$('#oNome').value.trim(),email=$('#oEmail').value.trim(),senha=$('#oSenha').value,papel=$('#oPapel').value;
  if(!nome||!email||!senha){toast('Preencha tudo.',true);return;}if(senha.length<6){toast('Senha mínima 6.',true);return;}
  const b=$('#btnNovoOp');b.disabled=true;b.innerHTML='<span class="spinner"></span> Criando…';
  const {data,error}=await _sb.rpc('fg_admin_criar_operador',{p_email:email,p_senha:senha,p_nome:nome,p_papel:papel});
  b.disabled=false;b.textContent='Criar operador';if(error||!data?.sucesso){toast(data?.mensagem||'Erro.',true);return;}
  toast('Operador criado ✓');carregarOperadores();}
async function toggleOp(id,ativo){const {data,error}=await _sb.rpc('fg_admin_editar_operador',{p_id:id,p_ativo:!ativo});
  if(error||!data?.sucesso){toast(data?.mensagem||'Erro.',true);return;}toast('Atualizado ✓');carregarOperadores();}

function setupNav(){const brand=document.querySelector('.brand');
  if(PAGE==='equipe'){document.querySelector('nav.menu').innerHTML='<a class="ghost" href="index.html">← Voltar ao site público</a>';if(brand)brand.setAttribute('onclick',"location.href='index.html'");}
  else if(PAGE==='publico'){const eq=document.getElementById('navEquipe');if(eq){eq.removeAttribute('onclick');eq.setAttribute('href','equipe.html');}}}
(async function init(){setupNav();
  try{const {data}=await _sb.auth.getSession();if(data?.session){const {data:papel}=await _sb.rpc('fg_meu_papel');if(papel){S.sessao=data.session;S.papel=papel;}}}catch(e){}
  ir(PAGE==='equipe'?'equipe':'home');})();
</script>
</body>
</html>
